name: Server CI

on:
  workflow_call:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock
      
      - name: Install Yarn
        run: npm install -g yarn
      
      - name: Install NestJS CLI
        run: npm i -g @nestjs/cli
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run linter
        run: yarn lint
        continue-on-error: true
      
      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true
      
      - name: Build project
        run: yarn build
      
      - name: Verify build artifacts
        shell: bash
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/main.js" ]; then
            echo "Error: dist/main.js not found"
            exit 1
          fi
          echo "✅ Build artifacts verified"
      
      - name: Run tests
        run: yarn test
        continue-on-error: true
      
      - name: Run e2e tests
        run: yarn test:e2e
        continue-on-error: true

  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock
      
      - name: Install Yarn
        run: npm install -g yarn
      
      - name: Install NestJS CLI
        run: npm i -g @nestjs/cli
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run linter
        run: yarn lint
      
      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock
      
      - name: Install Yarn
        run: npm install -g yarn
      
      - name: Install NestJS CLI
        run: npm i -g @nestjs/cli
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf dist
        continue-on-error: true
      
      - name: Build project
        run: yarn build
      
      - name: Check build artifacts
        shell: bash
        run: |
          echo "Checking generated files..."
          test -d dist || (echo "❌ dist directory not generated" && exit 1)
          test -f dist/main.js || (echo "❌ dist/main.js not generated" && exit 1)
          echo "✅ All build artifacts present"
      
      - name: Validate generated main.js syntax
        shell: bash
        run: |
          node -c dist/main.js || (echo "❌ Generated main.js has syntax errors" && exit 1)
          echo "✅ Generated main.js syntax is valid"

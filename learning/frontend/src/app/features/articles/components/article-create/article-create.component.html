<div class="article-form-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Create Article</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="article-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput type="text" formControlName="title" required />
          <mat-error *ngIf="articleForm.get('title')?.hasError('required')">
            Title is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Content</mat-label>
          <textarea matInput formControlName="content" rows="10" required></textarea>
          <mat-error *ngIf="articleForm.get('content')?.hasError('required')">
            Content is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Excerpt</mat-label>
          <textarea matInput formControlName="excerpt" rows="3"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Cover Image URL</mat-label>
          <input matInput type="url" formControlName="coverImage" />
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="articleForm.invalid">
            Create Article
          </button>
          <button mat-button type="button" routerLink="/articles">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="profile-container" *ngIf="user">
  <mat-card class="profile-card">
    <mat-card-header>
      <div class="profile-header">
        <img [src]="user.avatar || '/assets/default-avatar.jpg'" [alt]="user.username" class="profile-avatar" />
        <div class="profile-header-info">
          <mat-card-title>{{ user.username }}</mat-card-title>
          <mat-card-subtitle *ngIf="user.bio">{{ user.bio }}</mat-card-subtitle>
          <button mat-raised-button color="primary" routerLink="/profile/edit">
            <mat-icon>edit</mat-icon>
            Edit Profile
          </button>
        </div>
      </div>
    </mat-card-header>
    <mat-card-content>
      <div class="profile-info">
        <h3>Profile Information</h3>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p *ngIf="user.firstName"><strong>First Name:</strong> {{ user.firstName }}</p>
        <p *ngIf="user.lastName"><strong>Last Name:</strong> {{ user.lastName }}</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
